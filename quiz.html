  <div class="page-hero">
    <h1>心理測驗</h1>
    <p>「今日神明想對你說」— 五題測出你的守護指引</p>
  </div>

  <main class="page-main">
    <section id="quiz">
      <div class="inner" style="padding-top:0;">
        <div class="quiz-box">
          <div class="quiz-start" id="quizStart">
            <p class="quiz-intro">靜心一想，憑直覺選出最貼近你此刻心境的選項。測驗約需兩分鐘，結果僅供娛樂與自我反思，並非占卜定論。</p>
            <button type="button" class="btn btn-primary btn-block" id="btnStartQuiz">開始測驗</button>
          </div>

          <div class="quiz-active hidden" id="quizActive">
            <div class="quiz-progress"><div class="quiz-progress-bar" id="progressBar"></div></div>
            <p class="quiz-question" id="questionText"></p>
            <div class="quiz-options" id="optionsContainer"></div>
          </div>

          <div class="quiz-result" id="quizResult">
            <div class="result-icon" id="resultIcon"></div>
            <h3 id="resultTitle"></h3>
            <p id="resultDesc"></p>
            <button type="button" class="btn btn-primary btn-block" id="btnRetry">再測一次</button>
          </div>
        </div>

        <p class="page-home-link">
          <a href="index.html" class="btn btn-outline" style="border-color:var(--crimson);color:var(--crimson);">← 返回首頁</a>
        </p>
      </div>
    </section>
